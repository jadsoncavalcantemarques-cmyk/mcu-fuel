<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MCU — Redefinir Senha</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:16px;padding:40px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{background:#D4A017;border-radius:14px;width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#000;margin:0 auto 16px}
h1{text-align:center;font-size:20px;font-weight:800;margin-bottom:20px}
label{display:block;color:#555;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:6px;margin-top:14px}
input{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fafafa}
input:focus{outline:none;border-color:#D4A017}
.btn{width:100%;padding:12px;border:none;border-radius:8px;background:#D4A017;color:#000;font-size:13px;font-weight:800;cursor:pointer;margin-top:20px}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-top:12px;text-align:center}
.alert.error{background:#C0392B15;color:#C0392B}
.alert.success{background:#27AE6015;color:#27AE60}
</style>
</head>
<body>
<div class="box">
  <div class="logo">M</div>
  <h1>Redefinir Senha</h1>
  <form onsubmit="return reset(event)">
    <label>Nova senha</label>
    <input type="password" id="p1" required minlength="6">
    <label>Confirmar senha</label>
    <input type="password" id="p2" required minlength="6">
    <div id="alert" class="alert" style="display:none"></div>
    <button type="submit" class="btn">Redefinir</button>
  </form>
</div>
<script>
const token="{{ token }}";
async function reset(e){
  e.preventDefault();
  const p1=document.getElementById("p1").value,p2=document.getElementById("p2").value;
  const a=document.getElementById("alert");
  if(p1!==p2){a.className="alert error";a.textContent="Senhas não coincidem";a.style.display="block";return false}
  const r=await fetch("/api/auth/reset",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,password:p1})});
  const d=await r.json();
  if(r.ok){a.className="alert success";a.textContent=d.message+" Redirecionando...";a.style.display="block";setTimeout(()=>window.location.href="/login",2000)}
  else{a.className="alert error";a.textContent=d.error;a.style.display="block"}
  return false;
}
</script>
</body>
</html>
